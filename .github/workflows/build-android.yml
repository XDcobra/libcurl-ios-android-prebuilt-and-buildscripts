name: Build Android

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      openssl_version:
        required: false
        type: string
        default: 'v3.6.1-1'

concurrency:
  group: build-android-${{ inputs.version || github.ref }}
  cancel-in-progress: true

jobs:
  build_android:
    name: Build Android
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache Android Build
        id: cache-android
        uses: actions/cache@v5
        with:
          path: build/android
          key: ${{ runner.os }}-android-${{ inputs.version }}-${{ inputs.openssl_version }}-${{ hashFiles('build-android.sh') }}

      - name: Setup Android NDK
        if: steps.cache-android.outputs.cache-hit != 'true'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: true
          local-cache: false    # disable local cache to avoid linking errors: https://github.com/nttld/setup-ndk/issues/518#event-16541651206

      - name: Build Android Libraries
        if: steps.cache-android.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          OPENSSL_VERSION: ${{ inputs.openssl_version }}
        run: |
          chmod +x build-android.sh
          ./build-android.sh

      - name: Verify libcurl-openssl bundles OpenSSL shared libs
        run: |
          set -e
          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            d="build/android/libcurl-openssl/jniLibs/$abi"
            if [ ! -f "$d/libcurl.so" ] || [ ! -f "$d/libcrypto.so" ] || [ ! -f "$d/libssl.so" ]; then
              echo "Error: expected libcurl.so, libcrypto.so, libssl.so in $d"
              ls -la "$d" 2>/dev/null || true
              exit 1
            fi
          done
          echo "OK: libcurl-openssl per-ABI jniLibs complete"

      - name: ZIP Artifacts
        run: |
          cd build/android
          zip -r ../../libcurl-android.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: libcurl-android
          path: libcurl-android.zip
          retention-days: 1
